[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qme"
version = "0.1.0"
description = "Quick mechanistic exploration using machine learning potentials"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [
    {name = "rlaplaza-lab", email = "example@example.com"}
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research", 
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Chemistry",
]
dependencies = [
    "ase>=3.22.0",
    "numpy>=1.20.0",
    "click>=8.0.0",
    "requests>=2.25.0",
    "sella>=2.0.0",
]

[project.optional-dependencies]
ml = [
    "torch>=2.0.0",
    "fairchem-core>=1.0.0",
    "torch-cluster>=0.6.0",
    "mace-torch>=0.1.0",
    "jax>=0.4.20",
]
torchsim = [
    "torch-sim-atomistic>=0.3.0",
]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
]

[project.scripts]
qme = "qme.cli:main"

[project.urls]
Homepage = "https://github.com/rlaplaza-lab/qme"
Repository = "https://github.com/rlaplaza-lab/qme"

[tool.setuptools.packages.find]
include = ["qme*"]

[tool.setuptools.package-data]
qme = ["*.yml", "*.yaml", "*.json"]

[tool.black]
line-length = 88
target-version = ['py312']

[tool.isort]
profile = "black"
line_length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"
addopts = "-v --tb=short"
