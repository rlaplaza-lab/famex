[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "qme"
version = "0.1.0"
description = "Quick mechanistic exploration using machine learning potentials"
readme = "README.md"
requires-python = ">=3.8"
license = {text = "MIT"}
authors = [
    {name = "rlaplaza-lab", email = "example@example.com"}
]
dependencies = [
    "ase>=3.22.0",
    "sella>=2.0.0",
    "torch>=2.0.0",
    "numpy>=1.20.0",
    "click>=8.0.0",
    "fairchem-core>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
    "black>=23.0.0",
    "isort>=5.12.0",
    "flake8>=6.0.0",
]

[project.scripts]
qme = "qme.cli:main"

[project.urls]
Homepage = "https://github.com/rlaplaza-lab/qme"
Repository = "https://github.com/rlaplaza-lab/qme"

[tool.setuptools.packages.find]
where = ["."]
include = ["qme*"]

[tool.black]
line-length = 88
target-version = ['py38']

[tool.isort]
profile = "black"
line_length = 88

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
python_classes = "Test*"
python_functions = "test_*"